name: Daily BuildPulse

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install -r requirements.txt

      - name: Run Bot
        run: python bot.py
